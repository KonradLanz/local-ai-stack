#
# pfsense DHCP reservations recommended:
#   Reserve each MAC → IP so these IPs never change.
#   Services → DHCP Server → DHCP Static Mappings → Add

cluster_name: "greev-home-lab"
subnet: "192.168.1.0/24"
gateway: "192.168.1.2"           # pfsense: 192.168.1.2

nodes:
  - name: macbook-primary
    profile: primary
    hostname: mbp-von-konrad
    ip: "192.168.1.62"               # en0 — a4:4c:c8:5d:4c:8a
    mac: "a4:4c:c8:5d:4c:8a"
    ollama_port: 11434
    mesh_port: 11430
    openwebui_port: 3000
    enabled: true

  - name: qnap-nas
    profile: qnap
    hostname: nas
    ip: "192.168.1.201"              # nas.ad.own.dedyn.io — 24:5e:be:4f:d0:cd
    mac: "24:5e:be:4f:d0:cd"
    ollama_port: 11434
    mesh_port: 11430
    openwebui_port: 3002
    enabled: true

  - name: enobo
    profile: secondary
    hostname: enobo
    ip: "192.168.1.119"              # enobo.ad.own.dedyn.io — 00:1c:25:80:0b:b7
    mac: "00:1c:25:80:0b:b7"
    ollama_port: 11434
    mesh_port: 11430
    openwebui_port: 3001
    enabled: false                   # set true once Ollama is installed on enobo

  - name: windows-pc-1
    profile: windows-thin
    hostname: windows-pc-1
    ip: "192.168.1.30"
    mac: ""
    ollama_port: 11434
    openwebui_port: 3003
    enabled: false

# Discovery daemon writes live state to cluster/live-nodes.json (gitignored).
# Run: .venv/bin/python cluster/discover.py --once
