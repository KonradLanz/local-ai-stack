#
# Starts Open WebUI connected to Ollama on the host (or LM Studio).
# Ollama is expected to run on the host machine (installed by install.sh).
# For QNAP: replace host.docker.internal with the NAS LAN IP.

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: local-ai-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # --- Model backend ---
      # Option A: Ollama on host (default)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Option B: LM Studio on host (uncomment and set in .env)
      # - OPENAI_API_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      # - OPENAI_API_KEY=lm-studio

      # --- Perplexity search bridge ---
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}

      # --- IPR filter ---
      - IPR_FILTER_ENABLED=${IPR_FILTER_ENABLED:-true}
      - IPR_FILTER_MODEL=${IPR_FILTER_MODEL:-local}

      # --- General ---
      - WEBUI_AUTH=true
      - WEBUI_NAME=local-ai-stack
    volumes:
      - open-webui-data:/app/backend/data
      - ./config:/app/backend/config:ro
      - ./tools:/app/backend/tools:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux compatibility

volumes:
  open-webui-data:
    name: local-ai-stack-webui-data
